# Pipeline da DEMO: build da imagem (Dockerfile.demo) → Artifact Registry → Cloud Run.
# Uso:
#   gcloud builds submit --config=cloudbuild-demo.yaml --substitutions=_REGION=us-central1
substitutions:
  _REGION: us-central1
  _SERVICE: bidradar-demo
  _REPO: bidradar

steps:
  # 1) Garante o repositório no Artifact Registry (idempotente)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud artifacts repositories describe "$_REPO" --location="$_REGION" >/dev/null 2>&1 || \
        gcloud artifacts repositories create "$_REPO" --repository-format=docker --location="$_REGION"

  # 2) Build da imagem usando o Dockerfile da demo
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.demo
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:latest
      - .

  # 3) Push
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:latest

  # 4) Deploy no Cloud Run (URL pública para a apresentação)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:latest
      - --region=$_REGION
      - --allow-unauthenticated
      - --service-account=bidradar-demo@creattive-licitacoes-dev.iam.gserviceaccount.com
      - --memory=1Gi
      - --cpu=2
      - --min-instances=1
      - --max-instances=2
      - --port=8080
      - --timeout=600
      - --set-env-vars=BIDRADAR_LLM_PROVIDER=heuristic,BIDRADAR_VERTEX_PROJECT_ID=creattive-licitacoes-dev,BIDRADAR_VERTEX_LOCATION=us-central1,BIDRADAR_VERTEX_MODEL=gemini-2.5-flash,GOOGLE_GENAI_USE_VERTEXAI=true,BIDRADAR_ENABLE_BLL=false,BIDRADAR_ENABLE_CONLICITACAO=false

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:latest

options:
  logging: CLOUD_LOGGING_ONLY
