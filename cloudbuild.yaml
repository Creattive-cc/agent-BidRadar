steps:
  # 1. Build da imagem Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/bidradar/api:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/bidradar/api:latest'
      - '.'

  # 2. Push da imagem para o Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/bidradar/api'

  # 3. Deploy no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'bidradar-api'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/bidradar/api:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=us-central1'
      - '--service-account=agente-licitacoes@$PROJECT_ID.iam.gserviceaccount.com'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--no-allow-unauthenticated'

substitutions:
  _SERVICE_NAME: bidradar-api
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/bidradar/api:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/bidradar/api:latest'
