steps:
  # 1. Autenticação Docker → Artifact Registry
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'auth'
      - 'configure-docker'
      - 'us-central1-docker.pkg.dev'
      - '--quiet'

  # 2. Build da imagem (inclui React + FastAPI)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/bidradar/api:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/bidradar/api:latest'
      - '.'

  # 3. Push
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/bidradar/api'

  # 4. Deploy no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'bidradar-api'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/bidradar/api:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=us-central1'
      - '--service-account=agente-licitacoes@$PROJECT_ID.iam.gserviceaccount.com'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--allow-unauthenticated'
      - '--set-env-vars=BIDRADAR_JWT_SECRET=${_JWT_SECRET},BIDRADAR_ADMIN_EMAIL=${_ADMIN_EMAIL},BIDRADAR_ADMIN_PASSWORD=${_ADMIN_PASSWORD},BIDRADAR_LLM_PROVIDER=${_LLM_PROVIDER},BIDRADAR_VERTEX_PROJECT_ID=$PROJECT_ID,BIDRADAR_GCP_PROJECT_ID=$PROJECT_ID'

substitutions:
  _JWT_SECRET: 'change-me-set-in-cloud-build-trigger'
  _ADMIN_EMAIL: 'admin@bidradar.local'
  _ADMIN_PASSWORD: 'change-me-on-first-login'
  _LLM_PROVIDER: 'heuristic'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/bidradar/api:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/bidradar/api:latest'
